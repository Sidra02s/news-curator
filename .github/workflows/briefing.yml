name: Daily News Briefing
on:
  schedule:
    - cron: '0 2 * * *'   # daily briefing — 2am UTC (6am UAE)
    - cron: '0 3 * * 0'   # weekly retrain — Sundays 3am UTC
  workflow_dispatch:

jobs:
  run-briefing:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 2 * * *'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install requests feedparser scikit-learn python-telegram-bot python-dotenv groq rapidfuzz sentence-transformers google-genai

      - name: Initialize database
        run: python init_db.py
      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GUARDIAN_API_KEY: ${{ secrets.GUARDIAN_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main.py
      - name: Save outputs to docs folder
        run: |
          if [ ! -f briefing.txt ]; then
            echo "ERROR: briefing.txt was not generated. Pipeline failed."
            exit 1
          fi
          mkdir -p docs
          cp briefing.txt docs/briefing.txt
      - name: Convert briefing to HTML for GitHub Pages
        run: |
          python -c "
from metrics import load_briefing_as_html
from datetime import datetime
briefing_html = load_briefing_as_html()
date_str = datetime.now().strftime('%A, %B %d, %Y')
html = f'''<!DOCTYPE html>
<html lang=\"en\">
<head>
  <meta charset=\"UTF-8\">
  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">
  <title>Sidra's Morning Briefing</title>
  <style>
    body {{ font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 40px auto; padding: 20px; }}
    .header {{ text-align: center; margin-bottom: 30px; }}
    .date {{ color: #666; font-style: italic; }}
  </style>
</head>
<body>
  <div class=\"header\">
    <h1>Sidra's Morning Briefing</h1>
    <div class=\"date\">''' + date_str + '''</div>
  </div>
  <div class=\"content\">
    ''' + briefing_html + '''
  </div>
</body>
</html>'''
          with open('docs/index.html', 'w', encoding='utf-8') as f:
              f.write(html)
          "
      - name: Commit outputs to repo
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add docs/briefing.txt docs/dashboard.html docs/index.html
          git diff --staged --quiet || git commit -m "Update daily briefing and dashboard"
          git push

  weekly-retrain:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 3 * * 0'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install requests feedparser scikit-learn python-telegram-bot python-dotenv groq rapidfuzz sentence-transformers matplotlib seaborn
      - name: Initialize database
        run: python init_db.py
      - name: Merge feedback votes into training data
        run: python feedback_to_csv.py
      - name: Run autolabel on new articles
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python autolabel.py
      - name: Retrain models
        run: python train_models.py
      - name: Commit updated classifier and dataset
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add classifier.pkl labeled_headlines.csv model_comparison.json confusion_matrix.png
          git diff --staged --quiet || git commit -m "Weekly retrain — updated classifier and dataset"
          git push
